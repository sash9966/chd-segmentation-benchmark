name: autoseg
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch>=2.0
    - torchvision
    - monai[all]>=1.3
    - nibabel
    - numpy
    - pandas
    - scipy
    - scikit-image
    - matplotlib
    - optuna           # Auto3DSeg uses optuna for HPO
    - fire
# Notes:
#   MONAI Auto3DSeg is included in monai[all].
#   Auto3DSeg can also train SegResNet, DiNTS, SwinUNETR — the runner
#   automatically selects and ensembles. This can be slow on first run
#   due to architecture search; use --algorithms segresnet to pin one.
#
# Setup:
#   conda env create -f environments/autoseg.yml
#   conda activate autoseg
